user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain application/xml application/javascript application/json text/css;
    gzip_min_length 256;

    upstream django_backend {
        server missions_backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # === TODO: Redirect traffic to HTTPS once interconnected with domain ===

        # React (Vite) frontend build. Populated by deploying the frontend repo
        # to ./frontend/dist on the host — see deploy/FRONTEND_DEPLOY_VITE.md.
        root /app/frontend/dist;

        # Vite content-hashes filenames under /assets/, safe to cache forever.
        location /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Django-served static/media (collectstatic output, uploads).
        location /static/ {
            alias /app/static/;
        }

        location /media/ {
            alias /app/media/;
        }

        # API + admin: proxy to Django.
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else: serve the SPA, falling back to index.html for
        # client-side routing (React Router).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
