user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain application/xml application/javascript application/json;
    gzip_min_length 256;

    upstream django_backend {
        server missions_backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # === TODO: Redirect traffic to HTTPS once interconnected with domain ===
        # return 301 https://$host$request_uri;

        # === Serve static files (if you mount them later) ===
        location /static/ {
            alias /app/api/static/;
        }

        # === Serve media files (optional) ===
        location /media/ {
            alias /app/api/media/;
        }

        # === Proxy requests to Django backend ===
        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
