user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain application/xml application/javascript application/json;
    gzip_min_length 256;

    upstream django_backend {
        server missions_backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # === Vite React app (static files from dist/) ===
        root /app/frontend/dist;

        # Handle React Router: any non-file request → index.html
        # This allows client-side routing (e.g., /missions, /about) to work
        location / {
            try_files $uri $uri/ /index.html;
        }

        # === API calls: proxy to Django backend ===
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # === Admin panel: proxy to Django ===
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # === Static files from backend (Django collectstatic) ===
        location /static/ {
            proxy_pass http://django_backend;
        }

        # === Media uploads ===
        location /media/ {
            proxy_pass http://django_backend;
        }
    }
}
