services:
  backend:
    # On the VM we pull this prebuilt image from GHCR (built by CI, not on the
    # 1GB VM). `build: .` is kept so local dev can still `docker compose build`.
    image: ${BACKEND_IMAGE:-ghcr.io/paulwritescode/missions_backend:latest}
    build: .
    container_name: missions_backend
    env_file:
      - .env
    ports:
      - "9050:8000"
    # Watchtower only auto-updates containers carrying this label, so it never
    # touches postgres/redis/nginx — only the app image.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
        - static_volume:/app/static
        - media_volume:/app/media
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: missions_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: missions_redis
    env_file:
      - .env
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_URL: ${REDIS_URL}
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: missions_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # React (Vite) build. Populate via deploy/FRONTEND_DEPLOY_VITE.md — this
      # dir is untracked by git so `git reset --hard` in the deploy workflow
      # never touches it.
      - ./frontend/dist:/app/frontend/dist:ro
      - media_volume:/app/media
      - static_volume:/app/static
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Pull-based GitOps: polls GHCR and, when CI pushes a new backend image,
  # pulls it and recreates the backend container automatically (no SSH deploy
  # needed for code changes). --label-enable limits it to the backend only.
  watchtower:
    # containrrr/watchtower is unmaintained; its bundled Docker client is too
    # old for modern Docker Engine API versions. Use the maintained fork.
    image: nickfedor/watchtower:latest
    container_name: missions_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount registry creds only if the GHCR package is PRIVATE (see README).
      # - /home/deployer/.docker/config.json:/config.json:ro
    command: --label-enable --cleanup --interval ${WATCHTOWER_INTERVAL:-60}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
